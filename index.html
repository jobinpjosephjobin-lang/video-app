<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Live Flight Radar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

#title{
position:absolute;
top:0;
width:100%;
z-index:1000;
text-align:center;
padding:12px;
background:rgba(0,0,0,0.7);
font-size:22px;
letter-spacing:1px;
}

#map{
height:100vh;
width:100%;
}

.plane{
width:26px;
height:26px;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-3px)}
100%{transform:translateY(0)}
}

</style>

</head>

<body>

<div id="title">✈ Live Flight Radar</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map("map").setView([20,0],3);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19
}).addTo(map);


let planeMarkers=[];


function planeIcon(rotation){

return L.divIcon({

className:"",

html:`<img class="plane"
src="https://cdn-icons-png.flaticon.com/512/34/34627.png"
style="transform:rotate(${rotation}deg)">`,

iconSize:[26,26]

});

}



async function loadFlights(){

try{

const response = await fetch(
"https://api.allorigins.win/raw?url=https://opensky-network.org/api/states/all"
);

const data = await response.json();


planeMarkers.forEach(m=>map.removeLayer(m));
planeMarkers=[];


data.states.forEach(flight=>{

let lon = flight[5];
let lat = flight[6];

if(!lat || !lon) return;

let altitude = flight[7];
let velocity = flight[9];
let direction = flight[10] || 0;
let callsign = flight[1];
let country = flight[2];


let marker = L.marker(
[lat,lon],
{icon:planeIcon(direction)}
).addTo(map);


marker.bindPopup(

`<b>Flight:</b> ${callsign || "Unknown"}<br>
<b>Country:</b> ${country}<br>
<b>Altitude:</b> ${altitude || "N/A"} m<br>
<b>Speed:</b> ${velocity || "N/A"} m/s`

);


planeMarkers.push(marker);

});


}catch(error){

console.log("Flight loading error:",error);

}

}



function locateUser(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(pos=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

map.setView([lat,lon],6);

L.marker([lat,lon])
.addTo(map)
.bindPopup("📍 Your Location")
.openPopup();

});

}

}



loadFlights();
locateUser();

setInterval(loadFlights,15000);

</script>

</body>
</html>
