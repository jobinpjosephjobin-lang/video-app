<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Flight Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
background:#0b0f1a;
font-family:Arial;
}

#map{
height:100vh;
}

#title{
position:absolute;
z-index:1000;
width:100%;
padding:10px;
text-align:center;
background:rgba(0,0,0,0.7);
color:white;
font-size:20px;
}

</style>

</head>

<body>

<div id="title">✈ Live Flight Radar</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([22,78],5);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:18}
).addTo(map);


/* plane icon image */

const planeIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/684/684908.png",
iconSize:[20,20],
iconAnchor:[10,10]
});


let markers=[];


async function loadFlights(){

try{

const res = await fetch(
"https://corsproxy.io/?https://opensky-network.org/api/states/all"
);

const data = await res.json();

markers.forEach(m=>map.removeLayer(m));
markers=[];

let count=0;

data.states.forEach(f=>{

if(count>120) return;

const lon=f[5];
const lat=f[6];

if(!lat || !lon) return;

/* region filter to prevent overload */
if(lat<5 || lat>45 || lon<50 || lon>120) return;

let marker=L.marker([lat,lon],{
icon:planeIcon
}).addTo(map);

marker.bindPopup(
`Flight: ${f[1] || "Unknown"}<br>
Country: ${f[2]}<br>
Altitude: ${f[7] || "N/A"} m<br>
Speed: ${f[9] || "N/A"} m/s`
);

markers.push(marker);

count++;

});

}catch(e){

console.log("API error",e);

}

}

loadFlights();

setInterval(loadFlights,15000);

</script>

</body>
</html>
