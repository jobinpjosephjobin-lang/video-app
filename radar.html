<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Advanced Flight Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
background:#020611;
font-family:Arial;
color:white;
overflow:hidden;
}

#map{
height:100vh;
}

/* radar sweep */

#radar{
position:absolute;
top:50%;
left:50%;
width:600px;
height:600px;
margin-left:-300px;
margin-top:-300px;
border-radius:50%;
pointer-events:none;
background:conic-gradient(
rgba(0,255,0,0.25),
rgba(0,255,0,0) 60%
);
animation:spin 6s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#title{
position:absolute;
top:0;
width:100%;
z-index:1000;
padding:10px;
text-align:center;
background:rgba(0,0,0,0.6);
font-size:22px;
}

.plane{
width:22px;
height:22px;
}

</style>

</head>

<body>

<div id="title">✈ Advanced Flight Radar</div>

<div id="map"></div>
<div id="radar"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([22,78],5);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:18}
).addTo(map);

let markers=[];

/* rotating plane icon */

function planeIcon(rotation){

return L.divIcon({
className:"",
html:`<img class="plane"
src="https://cdn-icons-png.flaticon.com/512/684/684908.png"
style="transform:rotate(${rotation}deg)">`,
iconSize:[22,22]
});

}

/* airport markers */

const airports=[
{lat:28.5562,lon:77.1000,name:"Delhi Airport"},
{lat:19.0896,lon:72.8656,name:"Mumbai Airport"},
{lat:25.2528,lon:55.3644,name:"Dubai Airport"},
{lat:1.3644,lon:103.9915,name:"Singapore Airport"}
];

airports.forEach(a=>{
L.circleMarker([a.lat,a.lon],{
radius:5,
color:"yellow"
}).addTo(map).bindPopup(a.name);
});


async function loadFlights(){

try{

const res = await fetch(
"https://corsproxy.io/?https://opensky-network.org/api/states/all"
);

const data = await res.json();

markers.forEach(m=>map.removeLayer(m));
markers=[];

let count=0;

data.states.forEach(f=>{

if(count>150) return;

const lon=f[5];
const lat=f[6];

if(!lat || !lon) return;

/* asia filter */

if(lat<5 || lat>45 || lon<50 || lon>120) return;

const heading=f[10] || 0;

let marker=L.marker(
[lat,lon],
{icon:planeIcon(heading)}
).addTo(map);

marker.bindPopup(
`Flight: ${f[1] || "Unknown"}<br>
Country: ${f[2]}<br>
Altitude: ${f[7] || "N/A"} m<br>
Speed: ${f[9] || "N/A"} m/s`
);

markers.push(marker);

count++;

});

}catch(e){

console.log("API error",e);

}

}

loadFlights();
setInterval(loadFlights,15000);

/* user location */

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

map.setView([lat,lon],6);

L.marker([lat,lon])
.addTo(map)
.bindPopup("Your Location")
.openPopup();

});

}

</script>

</body>
</html>
